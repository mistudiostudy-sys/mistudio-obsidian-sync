name: Release

# Se dispara al pushear un tag con la versión EXACTA del manifest, sin prefijo
# (p. ej. `git tag 0.8.1 && git push origin 0.8.1`), como exige la community
# store de Obsidian. Compila main.js y publica el release con los assets que el
# bot de validación espera: manifest.json, main.js y versions.json.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: main.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            main.js
            manifest.json
            versions.json
